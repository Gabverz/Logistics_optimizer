name: Logistics ETL Pipeline

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  etl_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4        # ← atualizado

      - name: Configurar Python
        uses: actions/setup-python@v5    # ← atualizado
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar ETL
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python main_etl.py

      - name: Salvar parquet como artefato
        uses: actions/upload-artifact@v4  # ← já estava ok
        with:
          name: base-consolidada-logistica
          path: base_consolidada_logistica.parquet
          retention-days: 7